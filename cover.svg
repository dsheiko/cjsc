<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320" viewBox="0 0 960 320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1d27"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7a23e"/>
      <stop offset="100%" stop-color="#e8622a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="320" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="80" x2="960" y2="80"/>
    <line x1="0" y1="160" x2="960" y2="160"/>
    <line x1="0" y1="240" x2="960" y2="240"/>
    <line x1="240" y1="0" x2="240" y2="320"/>
    <line x1="480" y1="0" x2="480" y2="320"/>
    <line x1="720" y1="0" x2="720" y2="320"/>
  </g>

  <!-- Left: module files -->
  <g transform="translate(112, 110)">
    <!-- file 1 -->
    <rect x="0" y="0" width="68" height="52" rx="4" fill="#1e2233" stroke="#3a3f58" stroke-width="1.2"/>
    <rect x="0" y="0" width="68" height="13" rx="4" fill="#2a2f48"/>
    <rect x="0" y="9" width="68" height="4" fill="#2a2f48"/>
    <text x="7" y="10" font-family="monospace" font-size="7" fill="#6b7299">dep2.js</text>
    <text x="7" y="25" font-family="monospace" font-size="6.5" fill="#4a9eff">module</text>
    <text x="36" y="25" font-family="monospace" font-size="6.5" fill="#aab0cc">.</text>
    <text x="39" y="25" font-family="monospace" font-size="6.5" fill="#e8a16b">exports</text>
    <text x="7" y="35" font-family="monospace" font-size="6.5" fill="#aab0cc">  .name =</text>
    <text x="7" y="45" font-family="monospace" font-size="6.5" fill="#7ec98a">"dep2"</text>

    <!-- file 2 -->
    <rect x="0" y="64" width="68" height="52" rx="4" fill="#1e2233" stroke="#3a3f58" stroke-width="1.2"/>
    <rect x="0" y="64" width="68" height="13" rx="4" fill="#2a2f48"/>
    <rect x="0" y="73" width="68" height="4" fill="#2a2f48"/>
    <text x="7" y="74" font-family="monospace" font-size="7" fill="#6b7299">dep1.js</text>
    <text x="7" y="90" font-family="monospace" font-size="6.5" fill="#4a9eff">require</text>
    <text x="42" y="90" font-family="monospace" font-size="6.5" fill="#aab0cc">(</text>
    <text x="44" y="90" font-family="monospace" font-size="6.5" fill="#7ec98a">"./dep2"</text>
    <text x="7" y="100" font-family="monospace" font-size="6.5" fill="#e8a16b">exports</text>
    <text x="40" y="100" font-family="monospace" font-size="6.5" fill="#aab0cc">.name</text>
    <text x="7" y="110" font-family="monospace" font-size="6.5" fill="#aab0cc">  = "dep1-…"</text>

    <!-- file 3 -->
    <rect x="0" y="128" width="68" height="52" rx="4" fill="#1e2233" stroke="#3a3f58" stroke-width="1.2"/>
    <rect x="0" y="128" width="68" height="13" rx="4" fill="#2a2f48"/>
    <rect x="0" y="137" width="68" height="4" fill="#2a2f48"/>
    <text x="7" y="138" font-family="monospace" font-size="7" fill="#6b7299">main.js</text>
    <text x="7" y="154" font-family="monospace" font-size="6.5" fill="#aab0cc">var dep1 =</text>
    <text x="7" y="164" font-family="monospace" font-size="6.5" fill="#4a9eff">  require</text>
    <text x="40" y="164" font-family="monospace" font-size="6.5" fill="#aab0cc">(</text>
    <text x="43" y="164" font-family="monospace" font-size="6.5" fill="#7ec98a">"./dep1"</text>
    <text x="7" y="174" font-family="monospace" font-size="6.5" fill="#aab0cc">console.log(…)</text>
  </g>

  <!-- Arrow lines from files to compiler box -->
  <g stroke="#3a3f58" stroke-width="1.2" fill="none">
    <line x1="180" y1="136" x2="310" y2="175"/>
    <line x1="180" y1="200" x2="310" y2="195"/>
    <line x1="180" y1="264" x2="310" y2="215"/>
  </g>
  <!-- Arrowheads -->
  <polygon points="310,169 304,178 316,178" fill="#3a3f58" transform="rotate(-72 310 175)"/>
  <polygon points="310,189 304,198 316,198" fill="#3a3f58"/>
  <polygon points="310,209 304,218 316,218" fill="#3a3f58" transform="rotate(72 310 215)"/>

  <!-- Compiler box -->
  <rect x="310" y="140" width="110" height="80" rx="8" fill="#1e2233" stroke="url(#accent)" stroke-width="1.8" filter="url(#glow)"/>
  <text x="365" y="173" font-family="monospace" font-size="18" font-weight="bold" fill="#f7a23e" text-anchor="middle" filter="url(#glow)">cjsc</text>
  <text x="365" y="191" font-family="monospace" font-size="7.5" fill="#6b7299" text-anchor="middle">CommonJS Compiler</text>
  <text x="365" y="207" font-family="monospace" font-size="6.5" fill="#3a3f58" text-anchor="middle">v2.0.0 · 2013</text>

  <!-- Arrow from compiler to bundle -->
  <line x1="420" y1="180" x2="540" y2="180" stroke="#f7a23e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="540,175 552,180 540,185" fill="#f7a23e"/>

  <!-- Right: bundle output -->
  <g transform="translate(554, 110)">
    <rect x="0" y="0" width="88" height="140" rx="4" fill="#1e2233" stroke="#f7a23e44" stroke-width="1.2"/>
    <rect x="0" y="0" width="88" height="14" rx="4" fill="#2a2f48"/>
    <rect x="0" y="10" width="88" height="4" fill="#2a2f48"/>
    <text x="7" y="11" font-family="monospace" font-size="7" fill="#6b7299">bundle.js</text>
    <text x="7" y="28" font-family="monospace" font-size="5.8" fill="#555b78">;(function(modules){</text>
    <text x="7" y="38" font-family="monospace" font-size="5.8" fill="#555b78">  var require =</text>
    <text x="7" y="48" font-family="monospace" font-size="5.8" fill="#555b78">    function(id){…}</text>
    <text x="7" y="60" font-family="monospace" font-size="5.8" fill="#4a9eff">  // dep2.js</text>
    <text x="7" y="70" font-family="monospace" font-size="5.8" fill="#555b78">  modules[0]=</text>
    <text x="7" y="80" font-family="monospace" font-size="5.8" fill="#555b78">    function(){…}</text>
    <text x="7" y="92" font-family="monospace" font-size="5.8" fill="#4a9eff">  // dep1.js</text>
    <text x="7" y="102" font-family="monospace" font-size="5.8" fill="#555b78">  modules[1]=</text>
    <text x="7" y="112" font-family="monospace" font-size="5.8" fill="#555b78">    function(){…}</text>
    <text x="7" y="124" font-family="monospace" font-size="5.8" fill="#4a9eff">  // main.js</text>
    <text x="7" y="134" font-family="monospace" font-size="5.8" fill="#555b78">  modules[2]=…</text>
  </g>

  <!-- "works in any browser" label -->
  <text x="598" y="275" font-family="monospace" font-size="8.5" fill="#3d5a3e" text-anchor="middle">works in any browser</text>
  <rect x="553" y="264" width="88" height="14" rx="3" fill="#1a2e1a" stroke="#2d4a2e" stroke-width="1"/>
  <text x="597" y="274" font-family="monospace" font-size="8" fill="#5a9e5e" text-anchor="middle">works in any browser</text>

  <!-- Main title block (right side) -->
  <text x="800" y="148" font-family="monospace" font-size="54" font-weight="bold" fill="#f7a23e" text-anchor="middle" filter="url(#glow)">cjsc</text>
  <text x="800" y="175" font-family="monospace" font-size="13" fill="#6b7299" text-anchor="middle">CommonJS Compiler</text>

  <!-- Divider -->
  <rect x="740" y="188" width="120" height="1.2" fill="url(#accent)" opacity="0.5"/>

  <text x="800" y="208" font-family="sans-serif" font-size="10" fill="#4a4f68" text-anchor="middle">Bundle modules · Source maps · UMD</text>
  <text x="800" y="223" font-family="sans-serif" font-size="10" fill="#4a4f68" text-anchor="middle">Transforms · Minification</text>

  <!-- Year badge -->
  <rect x="755" y="240" width="90" height="20" rx="10" fill="#1e2233" stroke="#3a3f58" stroke-width="1"/>
  <text x="800" y="254" font-family="monospace" font-size="9" fill="#555b78" text-anchor="middle">est. 2013</text>
</svg>
